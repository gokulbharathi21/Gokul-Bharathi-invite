<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gokul ❤️ Bharathi</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(180deg,#fff9f7,#fdeee7);
  overflow-x:hidden;
}

/* INTRO */
.intro{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#fff0f3,#fde7ea);
  z-index:9999;
  transition:1.2s;
}
.intro.hide{opacity:0;visibility:hidden}

.intro h1{
  font-family:'Great Vibes';
  font-size:70px;
  color:#a83f63;
  animation:zoom 2s ease;
}

@keyframes zoom{
  from{transform:scale(0.6);opacity:0}
  to{transform:scale(1);opacity:1}
}

/* PARTICLES */
.particle{
  position:fixed;
  font-size:18px;
  animation:fall linear infinite;
  opacity:0.6;
}

@keyframes fall{
  from{transform:translateY(-10vh)}
  to{transform:translateY(110vh)}
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.box{
  background:rgba(255,255,255,0.4);
  backdrop-filter:blur(15px);
  padding:40px;
  border-radius:30px;
  animation:fadeUp 1.5s ease;
}

h1{
  font-family:'Great Vibes';
  font-size:80px;
  color:#a83f63;
}

.sub{
  font-family:'Cormorant Garamond';
  font-size:26px;
}

/* FLOAT */
@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
  100%{transform:translateY(0)}
}

/* COUNTDOWN */
.countdown{
  display:flex;
  gap:15px;
  justify-content:center;
  margin-top:30px;
  flex-wrap:wrap;
}

.time{
  width:90px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.5);
  backdrop-filter:blur(10px);
  animation:float 4s infinite;
}

.time h2{
  font-size:32px;
  color:#a83f63;
}

/* UPLOAD */
.upload{
  margin:80px auto;
  max-width:320px;
  padding:25px;
  border-radius:25px;
  background:rgba(255,255,255,0.5);
  backdrop-filter:blur(10px);
  text-align:center;
  animation:float 5s infinite;
}

.upload label{
  display:block;
  padding:25px;
  border:2px dashed #e0bcbc;
  border-radius:15px;
  cursor:pointer;
}

#photo{display:none}

#preview{
  width:100%;
  margin-top:15px;
  border-radius:15px;
}

/* SCROLL */
.reveal{
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}
.reveal.active{
  opacity:1;
  transform:translateY(0);
}

/* MUSIC */
.music{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#a83f63;
  color:#fff;
  border:none;
  padding:12px;
  border-radius:50%;
}

/* SHARE */
.share{
  display:block;
  margin:40px auto;
  padding:12px 25px;
  background:#25D366;
  color:white;
  text-align:center;
  border-radius:30px;
  width:200px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
  <h1>Gokul & Bharathi</h1>
</div>

<!-- MUSIC -->
<button class="music" onclick="toggleMusic()">🎵</button>
<audio id="song" loop>
  <source src="Song.mp3">
</audio>

<!-- PARTICLES -->
<script>
for(let i=0;i<20;i++){
  let p=document.createElement("div")
  p.className="particle"
  p.innerHTML="🌸"
  p.style.left=Math.random()*100+"%"
  p.style.animationDuration=(5+Math.random()*5)+"s"
  document.body.appendChild(p)
}
</script>

<!-- HERO -->
<section class="hero">
<div class="box reveal">
<h1>Gokul ❤️ Bharathi</h1>
<p class="sub">We invite you to celebrate our wedding</p>

<div class="countdown">
<div class="time"><h2 id="d"></h2>Days</div>
<div class="time"><h2 id="h"></h2>Hrs</div>
<div class="time"><h2 id="m"></h2>Min</div>
<div class="time"><h2 id="s"></h2>Sec</div>
</div>
</div>
</section>

<!-- UPLOAD -->
<div class="upload reveal">
<label for="photo">📸 Upload Your Photo</label>
<input type="file" id="photo">
<img id="preview">
</div>

<!-- SHARE -->
<a class="share" href="https://wa.me/?text=Join%20our%20wedding%20celebration!%20https://gokulbharathi21.github.io/Gokul-Bharathi-invite/" target="_blank">
Share Invite 💌
</a>

<script>
// INTRO
setTimeout(()=>{intro.classList.add("hide")},3000)

// COUNTDOWN
const target=new Date(2026,10,21).getTime()
setInterval(()=>{
let now=new Date().getTime()
let diff=target-now
d.innerText=Math.floor(diff/(1000*60*60*24))
h.innerText=Math.floor(diff/(1000*60*60)%24)
m.innerText=Math.floor(diff/(1000*60)%60)
s.innerText=Math.floor(diff/1000%60)
},1000)

// UPLOAD
photo.onchange=e=>{
let r=new FileReader()
r.onload=()=>preview.src=r.result
r.readAsDataURL(e.target.files[0])
}

// SCROLL
window.addEventListener("scroll",()=>{
document.querySelectorAll(".reveal").forEach(el=>{
if(el.getBoundingClientRect().top<window.innerHeight-50)
el.classList.add("active")
})
})

// MUSIC
let play=false
function toggleMusic(){
if(play){song.pause()}else{song.play()}
play=!play
}

document.addEventListener("click",()=>{
if(!play){song.play();play=true}
},{once:true})
</script>

</body>
</html>
